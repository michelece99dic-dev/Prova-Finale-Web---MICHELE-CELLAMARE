<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesa Pro - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #2ec4b6;
            --warning-color: #ff9f1c;
            --danger-color: #e71d36;
        }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        
        /* Feedback visivo forte */
        .item-card { 
            border: none; 
            border-left: 8px solid #ddd; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 12px;
        }
        .item-card:hover { transform: translateY(-3px); shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .completed { opacity: 0.6; background-color: #d1fae5 !important; border-left-color: #10b981 !important; }
        .completed h5 { text-decoration: line-through; color: #065f46; }

        /* Colori Categorie */
        .category-Cibo { border-left-color: var(--warning-color); }
        .category-Casa { border-left-color: var(--primary-color); }
        .category-Trasporti { border-left-color: #6c757d; }
        .category-Tempo-libero { border-left-color: #9b5de5; }
        .category-Salute { border-left-color: var(--danger-color); }
        .category-Altro { border-left-color: var(--success-color); }

        /* Bottoni Animati */
        .btn-action { transition: transform 0.2s; }
        .btn-action:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-black text-primary">🛒 Spesa Smart</h1>
        <p class="text-muted">Gestione intuitiva con anteprima costi</p>
    </header>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow border-0 p-3 rounded-4 sticky-top" style="top: 20px;">
                <h4 class="fw-bold mb-3">Nuovo Prodotto</h4>
                <form id="addForm">
                    <div class="mb-3">
                        <input type="text" id="addName" class="form-control" placeholder="Cosa serve?" required>
                    </div>
                    <div class="mb-3">
                        <textarea id="addDesc" class="form-control" placeholder="Note (opzionale)" rows="2"></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="small fw-bold">Prezzo €</label>
                            <input type="number" id="addPrice" class="form-control" step="0.01" value="0.00">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Qtà</label>
                            <input type="number" id="addQty" class="form-control" value="1" min="1">
                        </div>
                    </div>
                    <select id="addCategory" class="form-select mb-4">
                        <option value="Cibo">Cibo</option>
                        <option value="Casa">Casa</option>
                        <option value="Trasporti">Trasporti</option>
                        <option value="Tempo libero">Tempo libero</option>
                        <option value="Salute">Salute</option>
                        <option value="Altro">Altro</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">➕ Aggiungi alla Lista</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm">
                <div class="h3 mb-0">Totale: <span id="totalDisplay" class="text-primary fw-bold">€ 0.00</span></div>
                <div class="d-flex gap-2">
                    <select id="filterCat" class="form-select form-select-sm w-auto">
                        <option value="all">Tutte le categorie</option>
                        <option value="Cibo">Cibo</option>
                        <option value="Casa">Casa</option>
                    </select>
                    <button id="clearAll" class="btn btn-outline-danger btn-sm">Svuota</button>
                </div>
            </div>

            <div id="shoppingContainer"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-warning text-dark rounded-top-4">
        <h5 class="modal-title fw-bold">✏️ Modifica Prodotto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label class="small fw-bold">Nome</label>
                <input type="text" id="editName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Descrizione</label>
                <textarea id="editDesc" class="form-control" rows="2"></textarea>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small fw-bold">Prezzo (€)</label>
                    <input type="number" id="editPrice" class="form-control" step="0.01">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">Quantità</label>
                    <input type="number" id="editQty" class="form-control" min="1">
                </div>
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Categoria</label>
                <select id="editCategory" class="form-select">
                    <option value="Cibo">Cibo</option>
                    <option value="Casa">Casa</option>
                    <option value="Trasporti">Trasporti</option>
                    <option value="Tempo libero">Tempo libero</option>
                    <option value="Salute">Salute</option>
                    <option value="Altro">Altro</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mt-3">Salva Cambiamenti</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
