<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Lista della Spesa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🛒 Spesa Smart</h1>
            <p>Non dimenticare più nulla!</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="itemInput" placeholder="Aggiungi un prodotto..." aria-label="Nuovo prodotto">
                <button id="addBtn">Aggiungi</button>
            </div>

            <ul id="shoppingList">
                </ul>
        </main>

        <footer>
            <button id="clearList" class="btn-secondary">Svuota lista</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
