<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Spesa Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .completed { text-decoration: line-through; opacity: 0.6; }
        .item-card { transition: all 0.2s ease; border-left: 5px solid transparent; }
        .category-Cibo { border-left-color: #ffc107; }
        .category-Casa { border-left-color: #0dcaf0; }
        .category-Trasporti { border-left-color: #6c757d; }
        .category-Tempo-libero { border-left-color: #fd7e14; }
        .category-Salute { border-left-color: #dc3545; }
        .category-Altro { border-left-color: #20c997; }
    </style>
</head>
<body>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">🛒 Spesa Pro</h1>
            <p class="lead text-muted">Gestione budget e prodotti</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Aggiungi Prodotto</h5>
                        <form id="shoppingForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nome</label>
                                <input type="text" id="itemName" class="form-control" placeholder="Es: Pane" required>
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Prezzo (€)</label>
                                    <input type="number" id="itemPrice" class="form-control" placeholder="0.00" step="0.01" min="0">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Quantità</label>
                                    <input type="number" id="itemQty" class="form-control" value="1" min="1">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Categoria</label>
                                <select id="itemCategory" class="form-select">
                                    <option value="Cibo">Cibo</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Aggiungi</button>
                        </form>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-6">
                        <div class="card bg-white border-primary text-center p-3 shadow-sm">
                            <small class="text-muted text-uppercase fw-bold">Prodotti</small>
                            <h3 id="totalItems" class="mb-0 text-primary">0</h3>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-white border-success text-center p-3 shadow-sm">
                            <small class="text-muted text-uppercase fw-bold">Presi</small>
                            <h3 id="completedItems" class="mb-0 text-success">0</h3>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="card bg-dark text-white text-center p-3 shadow-sm">
                            <small class="text-uppercase fw-bold text-info">Totale Stimato</small>
                            <h2 id="totalCost" class="mb-0">€ 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-7">
                                <input type="text" id="searchInput" class="form-control" placeholder="Cerca un prodotto...">
                            </div>
                            <div class="col-md-5">
                                <select id="filterCategory" class="form-select">
                                    <option value="all">Tutte le categorie</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="shoppingList" class="list-group shadow-sm">
                    </div>

                <div class="mt-3 d-flex justify-content-between align-items-center">
                    <p class="text-muted small">* Clicca sulla spunta per segnare come acquistato</p>
                    <button id="clearAll" class="btn btn-sm btn-outline-danger">Svuota Tutto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
