<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesa Pro - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #2ec4b6;
            --warning-color: #ff9f1c;
            --danger-color: #e71d36;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        
        .item-card { 
            border: none; 
            border-left: 8px solid #ddd; 
            transition: all 0.2s ease-in-out; 
            border-radius: 12px;
        }
        .item-card:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .completed { opacity: 0.6; background-color: #d1fae5 !important; border-left-color: #10b981 !important; }
        .completed h5 { text-decoration: line-through; color: #065f46; }

        /* Colori Categorie */
        .category-Cibo { border-left-color: var(--warning-color); }
        .category-Casa { border-left-color: var(--primary-color); }
        .category-Trasporti { border-left-color: #6c757d; }
        .category-Tempo-libero { border-left-color: #9b5de5; }
        .category-Salute { border-left-color: var(--danger-color); }
        .category-Altro { border-left-color: var(--success-color); }

        .btn-action { transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">🛒 Spesa Smart</h1>
        <p class="text-muted">Dashboard avanzata con conferme sicure</p>
    </header>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow border-0 p-3 rounded-4 sticky-top" style="top: 20px;">
                <h4 class="fw-bold mb-3">Nuovo Prodotto</h4>
                <form id="addForm">
                    <div class="mb-3">
                        <input type="text" id="addName" class="form-control" placeholder="Cosa serve?" required>
                    </div>
                    <div class="mb-3">
                        <textarea id="addDesc" class="form-control" placeholder="Note (es. marca, varianti...)" rows="2"></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="small fw-bold">Prezzo €</label>
                            <input type="number" id="addPrice" class="form-control" step="0.01" value="0.00">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Qtà</label>
                            <input type="number" id="addQty" class="form-control" value="1" min="1">
                        </div>
                    </div>
                    <select id="addCategory" class="form-select mb-4">
                        <option value="Cibo">Cibo</option>
                        <option value="Casa">Casa</option>
                        <option value="Trasporti">Trasporti</option>
                        <option value="Tempo libero">Tempo libero</option>
                        <option value="Salute">Salute</option>
                        <option value="Altro">Altro</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">➕ Aggiungi</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm border">
                <div class="h3 mb-0">Totale: <span id="totalDisplay" class="text-primary fw-bold">€ 0.00</span></div>
                <div class="d-flex gap-2">
                    <select id="filterCat" class="form-select form-select-sm w-auto">
                        <option value="all">Filtra Categoria</option>
                        <option value="Cibo">Cibo</option>
                        <option value="Casa">Casa</option>
                        <option value="Trasporti">Trasporti</option>
                        <option value="Tempo libero">Tempo libero</option>
                        <option value="Salute">Salute</option>
                        <option value="Altro">Altro</option>
                    </select>
                </div>
            </div>

            <div id="shoppingContainer"></div>
            
            <div class="text-center mt-4">
                <button id="clearAll" class="btn btn-sm btn-outline-danger border-0">Svuota intera lista</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-warning text-dark border-0 rounded-top-4">
        <h5 class="modal-title fw-bold">✏️ Modifica</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label class="small fw-bold">Nome</label>
                <input type="text" id="editName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Descrizione</label>
                <textarea id="editDesc" class="form-control" rows="2"></textarea>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small fw-bold">Prezzo (€)</label>
                    <input type="number" id="editPrice" class="form-control" step="0.01">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">Quantità</label>
                    <input type="number" id="editQty" class="form-control" min="1">
                </div>
            </div>
            <select id="editCategory" class="form-select mb-3">
                <option value="Cibo">Cibo</option>
                <option value="Casa">Casa</option>
                <option value="Trasporti">Trasporti</option>
                <option value="Tempo libero">Tempo libero</option>
                <option value="Salute">Salute</option>
                <option value="Altro">Altro</option>
            </select>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2">Salva modifiche</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-body text-center p-4">
        <div class="display-1 text-danger mb-3">🗑️</div>
        <h5 class="fw-bold">Sei sicuro?</h5>
        <p class="text-muted small">L'azione non può essere annullata.</p>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">No</button>
            <button type="button" id="confirmDeleteBtn" class="btn btn-danger w-100">Sì, elimina</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
