<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Spesa Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Un pizzico di CSS personalizzato per rifinire */
        .completed { text-decoration: line-through; opacity: 0.6; }
        .item-card { transition: transform 0.2s; }
        .item-card:hover { transform: scale(1.01); }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">🛒 Spesa Pro</h1>
            <p class="lead text-muted">Gestisci i tuoi acquisti in modo intelligente</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="row mb-4">
                    <div class="col-6">
                        <div class="card bg-primary text-white text-center p-3 shadow-sm">
                            <h6>Prodotti</h6>
                            <h2 id="totalItems" class="mb-0">0</h2>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-success text-white text-center p-3 shadow-sm">
                            <h6>Completati</h6>
                            <h2 id="completedItems" class="mb-0">0</h2>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Aggiungi Prodotto</h5>
                        <form id="shoppingForm">
                            <div class="mb-3">
                                <input type="text" id="itemName" class="form-control" placeholder="Nome prodotto" required>
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-4">
                                    <input type="number" id="itemQty" class="form-control" value="1" min="1">
                                </div>
                                <div class="col-8">
                                    <select id="itemCategory" class="form-select">
                                        <option value="Alimentari">Alimentari</option>
                                        <option value="Casa">Casa</option>
                                        <option value="Igiene">Igiene</option>
                                        <option value="Altro">Altro</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Aggiungi alla lista</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-7">
                                <input type="text" id="searchInput" class="form-control" placeholder="Cerca un prodotto...">
                            </div>
                            <div class="col-md-5">
                                <select id="filterCategory" class="form-select">
                                    <option value="all">Tutte le categorie</option>
                                    <option value="Alimentari">Alimentari</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Igiene">Igiene</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="list-group shadow-sm" id="shoppingList">
                    </div>

                <div class="mt-4 d-flex justify-content-end">
                    <button id="clearAll" class="btn btn-outline-danger btn-sm">Svuota Lista</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
