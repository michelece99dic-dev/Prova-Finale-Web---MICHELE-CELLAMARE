<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesa Pro - Dashboard Completa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #2ec4b6;
        }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        
        .stat-card { border: none; border-radius: 15px; }
        .item-card { border: none; border-left: 8px solid #ddd; border-radius: 12px; transition: all 0.2s; }
        .completed { opacity: 0.6; background-color: #d1fae5 !important; border-left-color: #10b981 !important; }

        /* Colori Categorie Aggiornati */
        .category-Cibo { border-left-color: #ff9f1c; }
        .category-Casa { border-left-color: var(--primary-color); }
        .category-Trasporti { border-left-color: #6c757d; }
        .category-Tempo-libero { border-left-color: #9b5de5; }
        .category-Salute { border-left-color: #e71d36; }
        .category-Svago { border-left-color: #f72585; } /* Nuovo colore per Svago */
        .category-Altro { border-left-color: var(--success-color); }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">🛒 Spesa Smart</h1>
    </header>

    <div class="row g-3 mb-5">
        <div class="col-md-6">
            <div class="card stat-card shadow-sm bg-white p-3">
                <div class="d-flex align-items-center">
                    <div class="h1 me-3">📦</div>
                    <div>
                        <h6 class="text-muted mb-0">Prodotti in lista</h6>
                        <h2 id="countItems" class="fw-bold mb-0">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card stat-card shadow-sm bg-white p-3 border-start border-success border-5">
                <div class="d-flex align-items-center">
                    <div class="h1 me-3">💰</div>
                    <div>
                        <h6 class="text-muted mb-0">Totale Spesa</h6>
                        <h2 id="totalCost" class="fw-bold mb-0">€ 0.00</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 p-4 rounded-4 sticky-top" style="top: 20px;">
                <h4 class="fw-bold mb-3">Nuovo Prodotto</h4>
                <form id="addForm">
                    <div class="mb-3">
                        <input type="text" id="addName" class="form-control" placeholder="Cosa serve?" required>
                    </div>
                    <div class="mb-3">
                        <textarea id="addDesc" class="form-control" placeholder="Note (opzionale)" rows="2"></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="small fw-bold">Prezzo €</label>
                            <input type="number" id="addPrice" class="form-control" step="0.01" value="0.00">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Qtà</label>
                            <input type="number" id="addQty" class="form-control" value="1" min="1">
                        </div>
                    </div>
                    <select id="addCategory" class="form-select mb-4">
                        <option value="Cibo">Cibo</option>
                        <option value="Casa">Casa</option>
                        <option value="Trasporti">Trasporti</option>
                        <option value="Tempo libero">Tempo libero</option>
                        <option value="Salute">Salute</option>
                        <option value="Svago">Svago</option>
                        <option value="Altro">Altro</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">➕ Aggiungi</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold">La tua lista</h5>
                <select id="filterCat" class="form-select form-select-sm w-auto shadow-sm">
                    <option value="all">Tutte le categorie</option>
                    <option value="Cibo">Cibo</option>
                    <option value="Casa">Casa</option>
                    <option value="Trasporti">Trasporti</option>
                    <option value="Tempo libero">Tempo libero</option>
                    <option value="Salute">Salute</option>
                    <option value="Svago">Svago</option>
                    <option value="Altro">Altro</option>
                </select>
            </div>
            <div id="shoppingContainer"></div>
            <div class="text-center mt-4">
                <button id="clearAll" class="btn btn-sm btn-link text-danger text-decoration-none">Svuota tutto</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-warning text-dark border-0 rounded-top-4">
                <h5 class="modal-title fw-bold">✏️ Modifica Prodotto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="small fw-bold">Nome</label>
                        <input type="text" id="editName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Descrizione</label>
                        <textarea id="editDesc" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="small fw-bold">Prezzo (€)</label>
                            <input type="number" id="editPrice" class="form-control" step="0.01">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Quantità</label>
                            <input type="number" id="editQty" class="form-control" min="1">
                        </div>
                    </div>
                    <select id="editCategory" class="form-select mb-3">
                        <option value="Cibo">Cibo</option>
                        <option value="Casa">Casa</option>
                        <option value="Trasporti">Trasporti</option>
                        <option value="Tempo libero">Tempo libero</option>
                        <option value="Salute">Salute</option>
                        <option value="Svago">Svago</option>
                        <option value="Altro">Altro</option>
                    </select>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mt-2">Aggiorna</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body text-center p-4">
                <h2 class="text-danger mb-3">⚠️</h2>
                <h5 class="fw-bold">Rimuovere il prodotto?</h5>
                <div class="d-flex gap-2 mt-4">
                    <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">No</button>
                    <button type="button" id="confirmDeleteBtn" class="btn btn-danger w-100">Sì</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
